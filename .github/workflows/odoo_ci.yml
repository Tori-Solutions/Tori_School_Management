name: Odoo Module CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - run: pip install flake8
            - run: flake8 . --max-line-length=120 --exclude=migrations

    test:
        runs-on: ubuntu-latest
        needs: lint
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: odoo
                    POSTGRES_PASSWORD: odoo
                    POSTGRES_DB: test_tsm
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v4
              with:
                  path: custom_addons/tori_school_management

            - uses: actions/checkout@v4
              with:
                  repository: odoo/odoo
                  ref: "19.0"
                  path: odoo
                  depth: 1

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Odoo dependencies
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq libldap2-dev libsasl2-dev
                  pip install -r odoo/requirements.txt

            - name: Run module tests
              env:
                  PGHOST: localhost
                  PGUSER: odoo
                  PGPASSWORD: odoo
              run: |
                  python odoo/odoo-bin \
                    --addons-path=odoo/addons,custom_addons \
                    -d test_tsm \
                    -i tori_school_management \
                    --test-enable \
                    --stop-after-init \
                    --log-level=test
